<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="obs-unified — self-hosted observability for the whole stack">
  <title>obs-unified</title>
  <defs>
    <linearGradient id="ouProfileMark" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#006B18"/>
      <stop offset="1" stop-color="#008821"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#F9F9F9"/>
  <rect x="32" y="32" width="1216" height="256" fill="#FFFFFF"/>
  <rect x="32" y="32" width="10" height="256" fill="#006B18"/>

  <!-- Brand lockup, left -->
  <g transform="translate(86 72)">
    <rect width="72" height="72" fill="url(#ouProfileMark)"/>
    <rect x="13" y="20"   width="38" height="6" fill="#FFFFFF"/>
    <rect x="13" y="33"   width="25" height="6" fill="#FFFFFF"/>
    <rect x="13" y="46"   width="45" height="6" fill="#FFFFFF"/>
  </g>

  <text
    x="180" y="120"
    fill="#1A1C1C"
    font-family="'Inter Variable','Inter',ui-sans-serif,system-ui,sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="3.4"
  >OBS-UNIFIED</text>

  <text
    x="180" y="148"
    fill="#006B18"
    font-family="'Inter Variable','Inter',ui-sans-serif,system-ui,sans-serif"
    font-size="12"
    font-weight="700"
    letter-spacing="1.5"
  >SELF-HOSTED OBSERVABILITY · MIT</text>

  <!-- Editorial tagline -->
  <text
    x="86" y="216"
    fill="#1A1C1C"
    font-family="'Inter Variable','Inter',ui-sans-serif,system-ui,sans-serif"
    font-size="42"
    font-weight="300"
    letter-spacing="-0.8"
  >Every signal, one ledger.</text>

  <!-- Subhead -->
  <text
    x="86" y="252"
    fill="#4E5555"
    font-family="'Inter Variable','Inter',ui-sans-serif,system-ui,sans-serif"
    font-size="16"
    font-weight="400"
  >Traces · Logs · AI calls · Replay · Usage · Alerts · Profiles</text>

  <!-- Bottom strip with repo manifest, tabular numerics -->
  <rect x="32" y="262" width="1216" height="26" fill="#F3F3F3"/>
  <text
    x="86" y="280"
    fill="#1A1C1C"
    font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
    font-size="12"
    font-weight="600"
  >obs-unified  ·  obs-unified-docs  ·  presence  ·  ci</text>
  <text
    x="1226" y="280"
    text-anchor="end"
    fill="#6B7171"
    font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
    font-size="12"
    font-weight="500"
  >MIT</text>
</svg>
